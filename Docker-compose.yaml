services:
  db:
    image: postgres:18-alpine3.22
    container_name: my_fastapi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: marketplace_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      WATCHFILES_FORCE_POLLING: "true"
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "5678:5678"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m debugpy --listen 0.0.0.0:5678 -m uvicorn gems_marketplace.main:gems_marketplace --host 0.0.0.0 --port 8000 --reload"

volumes:
  pg_data:
